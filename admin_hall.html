<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Схема Зала</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Russo+One&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #8c8c8c;
            font-family: 'Exo 2', sans-serif;
            color: white;
            text-align: center;
        }

        .hall-top {
            background-color: #0b5912;
            /* Темно-зеленый (Курпачи) */
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .overlay-scene {
            position: absolute;
            top: 7%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-family: 'Russo One', sans-serif;
            color: white;
            letter-spacing: 2px;
            z-index: 10;
        }

        .overlay-fan-zone {
            position: absolute;
            top: 36%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-family: 'Russo One', sans-serif;
            color: white;
            letter-spacing: 1px;
            z-index: 10;
        }

        .overlay-arc-price {
            position: absolute;
            top: 46%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #7b1d28;
            border-radius: 20px;
            padding: 4px 16px;
            font-family: 'Russo One', sans-serif;
            font-size: 16px;
            color: white;
            z-index: 10;
        }

        .overlay-kurpachi {
            position: absolute;
            top: 78%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Russo One', sans-serif;
            font-size: 22px;
            line-height: 1.2;
            color: white;
            letter-spacing: 1px;
            width: 100%;
            z-index: 10;
        }

        .seat-circle {
            fill: white;
            transition: fill 0.3s;
        }

        .seat-circle.sold {
            fill: #e53935;
        }

        .seat-text {
            fill: #7b1d28;
            font-size: 8px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: central;
            font-family: 'Russo One', sans-serif;
        }

        .seat-circle.sold+.seat-text {
            fill: white;
        }

        .vip-zone {
            background-color: #e8e24c;
            color: black;
            font-family: 'Russo One', sans-serif;
            padding: 16px 14px;
            border-radius: 25px;
            position: absolute;
            top: 61%;
            font-size: 15px;
            z-index: 10;
            transition: background-color 0.3s;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
        }

        .vip-left {
            left: 4%;
            transform: rotate(-40deg);
        }

        .vip-right {
            right: 4%;
            transform: rotate(40deg);
        }

        .vip-zone.sold {
            background-color: #e53935;
            color: rgba(255, 255, 255, 0.2);
        }

        .vip-zone.sold::before,
        .vip-zone.sold::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 4px;
            background-color: white;
            border-radius: 2px;
        }

        .vip-zone.sold::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .vip-zone.sold::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .lower-section {
            padding: 25px 10px;
        }

        .price-tag-lower {
            background-color: #7b1d28;
            border-radius: 20px;
            padding: 6px 20px;
            display: inline-block;
            font-family: 'Russo One', sans-serif;
            font-size: 18px;
            color: white;
            margin-bottom: 20px;
        }

        .blocks-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .block-row {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }
        .block {
            background-color: #7b1d28;
            border-radius: 12px 12px 4px 4px;
            padding: 10px 2px;
            display: flex;
            gap: 3px;
            flex: 1;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .block-seat-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .block-seat {
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 3px;
            transition: background-color 0.3s;
        }
        .block-seat.sold {
            background-color: #e53935;
        }
        .block-number {
            font-size: 9px;
            color: white;
            font-family: 'Russo One', sans-serif;
        }

        .controls {
            padding: 20px;
            padding-bottom: 40px;
        }

        button.refresh-btn {
            background-color: #2b2b2b;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-family: 'Russo One', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
        }

        button.refresh-btn:active {
            transform: scale(0.96);
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-family: 'Russo One', sans-serif;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div id="loading">Загрузка билетов...</div>

    <div class="hall-top">
        <!-- SVG Background and Seats -->
        <svg id="hall-svg" viewBox="0 0 400 340" style="width: 100%; height: auto; display: block;"
            xmlns="http://www.w3.org/2000/svg">
            <!-- Светло-зеленый фон Фан-зоны -->
            <path d="M 0 0 A 200 200 0 0 0 400 0 Z" fill="#148c20" />

            <!-- Толстая красная дуга -->
            <!-- Немного выходим за границы (от -10 до 410), чтобы края не обрезались по толщине -->
            <path d="M -10 0 A 210 210 0 0 0 410 0" fill="none" stroke="#7b1d28" stroke-width="45"
                stroke-linecap="butt" />

            <!-- Темно-серая Сцена (полуэллипс) -->
            <path d="M 25 0 A 175 75 0 0 0 375 0 Z" fill="#2b2b2b" />

            <!-- Группа для мест (генерируется JS) -->
            <g id="seats-container"></g>
        </svg>

        <!-- Overlay Text Elements -->
        <div class="overlay-scene">СЦЕНА</div>
        <div class="overlay-fan-zone">ФАН-ЗОНА</div>
        <div class="overlay-arc-price">300.000 UZS</div>

        <div class="overlay-kurpachi">
            КУРПАЧИ<br>1.000.000 UZS
        </div>

        <div class="vip-zone vip-left" id="seat-6-1">6 ЧЕЛ.</div>
        <div class="vip-zone vip-right" id="seat-6-2">6 ЧЕЛ.</div>
    </div>

    <div class="lower-section">
        <div class="price-tag-lower">300.000 UZS</div>
        <div class="blocks-container" id="blocks-container">
            <!-- Сюда JS добавит нижние ряды -->
        </div>
    </div>

    <div class="controls">
        <button class="refresh-btn" onclick="fetchData()">🔄 Обновить схему</button>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКИ
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxY4vsZqhUlpvOhnRGWU4v9X4PfKwNEoerVNqE2R2ueFwxJWM8UgMi-HRXNAh0_eHWWqQ/exec";

        document.addEventListener('DOMContentLoaded', () => {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();

            generateArcSeats();
            generateBlocks();

            if (API_URL && API_URL.startsWith("https://")) {
                fetchData();
            } else {
                document.getElementById('loading').style.display = 'none';
                alert("Необходимо вставить ссылку от Google Apps Script в файл admin_hall.html");
            }
        });

        // Отрисовка распределенных 30 мест
        function generateArcSeats() {
            const seatsContainer = document.getElementById('seats-container');
            const totalSeats = 30;

            const cx = 200;
            const cy = 0;
            const r = 210;

            // Распределяем места так, чтобы они не выходили за края экрана (от x=11 до x=389)
            const startAngle = Math.PI * 0.855;
            const endAngle = Math.PI * 0.145;

            let html = '';

            for (let i = 1; i <= totalSeats; i++) {
                const fraction = (i - 1) / (totalSeats - 1);
                const angle = startAngle - (startAngle - endAngle) * fraction;

                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);

                html += `
                <g id="seat-group-1-${i}" class="seat-group">
                    <circle cx="${x}" cy="${y}" r="6.5" class="seat-circle" id="seat-1-${i}" />
                    <text x="${x}" y="${y}" class="seat-text" dy="0.35em" pointer-events="none">${i}</text>
                </g>`;
            }

            seatsContainer.innerHTML = html;
        }

        // Отрисовка нижних 3х рядов по 21 месту
        function generateBlocks() {
            const rows = [2, 3, 4];
            const blocksContainer = document.getElementById('blocks-container');

            rows.forEach(rowNum => {
                const blockRow = document.createElement('div');
                blockRow.className = 'block-row';

                let seatCounter = 1;

                for (let b = 0; b < 3; b++) {
                    const block = document.createElement('div');
                    block.className = 'block';

                    for (let s = 0; s < 7; s++) {
                        const seatWrapper = document.createElement('div');
                        seatWrapper.className = 'block-seat-container';

                        const seat = document.createElement('div');
                        seat.className = 'block-seat';
                        seat.id = `seat-${rowNum}-${seatCounter}`;

                        const num = document.createElement('div');
                        num.className = 'block-number';
                        num.innerText = seatCounter;

                        seatWrapper.appendChild(seat);
                        seatWrapper.appendChild(num);
                        block.appendChild(seatWrapper);

                        seatCounter++;
                    }
                    blockRow.appendChild(block);
                }
                blocksContainer.appendChild(blockRow);
            });
        }

        // Получение данных и закрашивание мест
        async function fetchData() {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            try {
                // Очистка старых данных
                document.querySelectorAll('.sold').forEach(el => el.classList.remove('sold'));

                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.seats && Array.isArray(data.seats)) {
                    data.seats.forEach(seatKey => {
                        const element = document.getElementById(`seat-${seatKey}`);
                        if (element) {
                            element.classList.add('sold');
                        }
                    });
                } else if (data.error) {
                    alert("Ошибка от сервера: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Ошибка при получении данных. Проверьте ссылку Apps Script.");
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>

</html>
