<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Схема Зала</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #8c8c8c;
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
        }

        .green-zone {
            background-color: #0b5912;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            padding-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .scene {
            background-color: #2b2b2b;
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 30px;
            margin-left: -10%;
            width: 120%;
        }

        .fan-zone {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 60px;
        }

        .arc-row {
            position: relative;
            height: 90px;
            margin-bottom: 10px;
            width: 100%;
        }

        .seat {
            width: 14px;
            height: 14px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7b1d28;
            font-size: 7px;
            font-weight: bold;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.3);
            position: absolute;
            transition: background-color 0.3s;
        }

        .seat.sold {
            background-color: #e53935;
            /* Красный цвет для занятых */
            color: white;
        }

        .price-tag {
            background-color: #7b1d28;
            border-radius: 20px;
            padding: 5px 15px;
            display: inline-block;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            z-index: 10;
            position: relative;
        }

        .kurpachi {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            line-height: 1.2;
        }

        .vip-zone {
            background-color: #e8e24c;
            color: black;
            font-weight: bold;
            padding: 15px 10px;
            border-radius: 25px;
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .vip-left {
            left: 10px;
            transform: rotate(-45deg);
        }

        .vip-right {
            right: 10px;
            transform: rotate(45deg);
        }

        .vip-zone.sold {
            background-color: #e53935;
            color: white;
        }

        .lower-section {
            padding: 20px 10px;
        }

        .blocks-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .block-row {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }

        .block {
            background-color: #7b1d28;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
            padding: 10px 5px;
            display: flex;
            gap: 3px;
            flex: 1;
            justify-content: center;
        }

        .block-seat-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .block-seat {
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 3px;
            transition: background-color 0.3s;
        }

        .block-seat.sold {
            background-color: #e53935;
        }

        .block-number {
            font-size: 10px;
            font-weight: bold;
        }

        .controls {
            padding: 20px;
        }

        button.refresh-btn {
            background-color: #2b2b2b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        button.refresh-btn:active {
            transform: scale(0.98);
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div id="loading">Загрузка билетов...</div>

    <div class="green-zone">
        <div class="scene">СЦЕНА</div>
        <div class="fan-zone">ФАН-ЗОНА</div>

        <div class="arc-row" id="arc-row">
            <!-- Сюда JS добавит 30 мест -->
        </div>

        <div class="price-tag">300.000 UZS</div>

        <div class="kurpachi">
            КУРПАЧИ<br>1.000.000 UZS
        </div>

        <!-- ID для мест на 6 человек: 6-1 (слева), 6-2 (справа) -->
        <div class="vip-zone vip-left" id="seat-6-1">6 ЧЕЛ.</div>
        <div class="vip-zone vip-right" id="seat-6-2">6 ЧЕЛ.</div>
    </div>

    <div class="lower-section">
        <div class="price-tag">300.000 UZS</div>
        <div class="blocks-container" id="blocks-container">
            <!-- Сюда JS добавит нижние ряды -->
        </div>
    </div>

    <div class="controls">
        <button class="refresh-btn" onclick="fetchData()">🔄 Обновить схему</button>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКИ
        // ==========================================
        // СЮДА НУЖНО БУДЕТ ВСТАВИТЬ ССЫЛКУ ИЗ GOOGLE APPS SCRIPT!
        const API_URL = "https://script.google.com/macros/s/AKfycbxY4vsZqhUlpvOhnRGWU4v9X4PfKwNEoerVNqE2R2ueFwxJWM8UgMi-HRXNAh0_eHWWqQ/exec";

        document.addEventListener('DOMContentLoaded', () => {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();

            generateArcSeats();
            generateBlocks();

            // Если ссылка установлена, загружаем данные
            if (API_URL && !API_URL.includes("https://script.google.com/macros/s/AKfycbxY4vsZqhUlpvOhnRGWU4v9X4PfKwNEoerVNqE2R2ueFwxJWM8UgMi-HRXNAh0_eHWWqQ/exec")) {
                fetchData();
            } else {
                document.getElementById('loading').style.display = 'none';
                alert("Необходимо вставить ссылку от Google Apps Script в файл admin_hall.html");
            }
        });

        // Отрисовка полукруга 30 мест
        function generateArcSeats() {
            const arcRow = document.getElementById('arc-row');
            const totalSeats = 30;

            for (let i = 1; i <= totalSeats; i++) {
                const seat = document.createElement('div');
                seat.className = 'seat';
                seat.id = `seat-1-${i}`;
                seat.innerText = i;

                // Расчет дуги от 170 до 10 градусов
                const startAngle = Math.PI * 0.94;
                const endAngle = Math.PI * 0.06;
                const angle = startAngle - (startAngle - endAngle) * ((i - 1) / (totalSeats - 1));

                // Имитация эллипса (сплюснутая окружность)
                const xPercent = 50 + 46 * Math.cos(angle);
                const yPercent = 100 - 100 * Math.sin(angle);

                seat.style.left = `calc(${xPercent}% - 7px)`;
                seat.style.top = `${yPercent}%`;

                arcRow.appendChild(seat);
            }
        }

        // Отрисовка нижних 3х рядов по 21 месту
        function generateBlocks() {
            const rows = [2, 3, 4];
            const blocksContainer = document.getElementById('blocks-container');

            rows.forEach(rowNum => {
                const blockRow = document.createElement('div');
                blockRow.className = 'block-row';

                let seatCounter = 1;

                for (let b = 0; b < 3; b++) {
                    const block = document.createElement('div');
                    block.className = 'block';

                    for (let s = 0; s < 7; s++) {
                        const seatWrapper = document.createElement('div');
                        seatWrapper.className = 'block-seat-container';

                        const seat = document.createElement('div');
                        seat.className = 'block-seat';
                        seat.id = `seat-${rowNum}-${seatCounter}`;

                        const num = document.createElement('div');
                        num.className = 'block-number';
                        num.innerText = seatCounter; // От 1 до 21 сквозная нумерация

                        seatWrapper.appendChild(seat);
                        seatWrapper.appendChild(num);
                        block.appendChild(seatWrapper);

                        seatCounter++;
                    }
                    blockRow.appendChild(block);
                }
                blocksContainer.appendChild(blockRow);
            });
        }

        // Получение данных и закрашивание мест
        async function fetchData() {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            try {
                // Очистка старых данных
                document.querySelectorAll('.sold').forEach(el => el.classList.remove('sold'));

                // Запрос к Google Apps Script
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.seats && Array.isArray(data.seats)) {
                    data.seats.forEach(seatKey => {
                        // Ожидаемый формат: 2-11
                        const element = document.getElementById(`seat-${seatKey}`);
                        if (element) {
                            element.classList.add('sold');
                        }
                    });
                } else if (data.error) {
                    alert("Ошибка от сервера: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Ошибка при получении данных. Проверьте ссылку Apps Script.");
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>

</html>
