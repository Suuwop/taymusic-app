<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал Tay Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 15px; margin: 0;
            display: flex; flex-direction: column; min-height: 95vh;
        }

        /* --- СТИЛИ ТАБОВ (ВКЛАДОК) --- */
        .tabs {
            display: flex;
            justify-content: space-between;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--tg-theme-hint-color, #999);
            transition: 0.2s;
            font-weight: 500;
        }
        .tab.active {
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold;
        }

        /* Карточки */
        .student-card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px; padding: 15px; margin-bottom: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .card-predone { border-left: 4px solid #007aff; background: rgba(0, 122, 255, 0.05); }
        
        .row { display: flex; justify-content: space-between; align-items: center; }
        .name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .status { font-size: 12px; opacity: 0.8; }
        
        /* Тоггл */
        .toggle-container { position: relative; width: 46px; height: 26px; }
        .toggle-checkbox { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .3s; border-radius: 34px;
        }
        .toggle-slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: #34c759; } 
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        /* Дата */
        .makeup-date { margin-top: 10px; display: none; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.05); }
        .makeup-date input {
            width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ccc;
            box-sizing: border-box; font-size: 16px;
            background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color);
        }

        #main-btn {
            margin-top: auto; width: 100%; padding: 15px; 
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        
        #empty-msg { text-align: center; margin-top: 50px; opacity: 0.5; font-size: 14px; }
    </style>
</head>
<body>

    <div class="tabs" id="tabs-container"></div>

    <div id="list"></div>
    <div id="empty-msg" style="display:none">Учеников нет 😴</div>
    
    <button id="main-btn" onclick="sendData()">📤 Отправить отчет</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let allData = {}; // Тут храним данные
        let currentDateKey = ""; // Какая вкладка сейчас открыта

        // Инициализация
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');

        try {
            if (rawData) {
                // Парсим большой пакет данных
                allData = JSON.parse(decodeURIComponent(rawData));
                
                // Находим ключи (даты) и сортируем их (Новейшая первая)
                let keys = Object.keys(allData).sort().reverse();
                
                // Если данных нет совсем
                if (keys.length === 0) throw new Error("No Data");

                currentDateKey = keys[0]; // Открываем вкладку по умолчанию
                
                renderTabs(keys);
                renderList(currentDateKey);
            }
        } catch (e) {
            document.getElementById('list').innerHTML = "Ошибка загрузки: " + e;
        }

        function renderTabs(keys) {
            const container = document.getElementById('tabs-container');
            container.innerHTML = "";
            
            keys.forEach(dateStr => {
                let parts = dateStr.split('-');
                let label = `${parts[2]}.${parts[1]}`; // "02.03"
                
                let d = new Date(dateStr);
                let today = new Date();
                today.setHours(0,0,0,0); d.setHours(0,0,0,0);
                
                let diff = (today - d) / (1000 * 60 * 60 * 24);
                if (diff === 0) label = "Сегодня";
                if (diff === 1) label = "Вчера";

                let tab = document.createElement('div');
                tab.className = `tab ${dateStr === currentDateKey ? 'active' : ''}`;
                
                // Если отчет за этот день уже сдан, добавляем галочку в таб
                if (allData[dateStr].is_sub) {
                    label += " ✅";
                }
                
                tab.innerText = label;
                tab.onclick = () => switchTab(dateStr);
                tab.id = `tab-${dateStr}`;
                container.appendChild(tab);
            });
        }

        function switchTab(dateKey) {
            document.getElementById(`tab-${currentDateKey}`).classList.remove('active');
            currentDateKey = dateKey;
            document.getElementById(`tab-${currentDateKey}`).classList.add('active');
            renderList(dateKey);
        }

        function renderList(dateKey) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            
            // 🔥 РАСПАКОВКА НОВОГО ФОРМАТА
            let dayData = allData[dateKey];
            if (!dayData) return;

            let students = dayData.items || [];
            let isSubmitted = dayData.is_sub || false;
            
            if (students.length === 0) {
                document.getElementById('empty-msg').style.display = 'block';
                document.getElementById('main-btn').style.display = 'none';
                return;
            } else {
                document.getElementById('empty-msg').style.display = 'none';
                document.getElementById('main-btn').style.display = 'block';
            }

            // Изменяем кнопку, если отчет уже сдан
            const mainBtn = document.getElementById('main-btn');
            if (isSubmitted) {
                mainBtn.innerHTML = "⚠️ Перезаписать отчет";
                mainBtn.style.backgroundColor = "#ff9500"; // Оранжевый цвет
            } else {
                mainBtn.innerHTML = "📤 Отправить отчет";
                mainBtn.style.backgroundColor = "var(--tg-theme-button-color, #3390ec)";
            }

            students.forEach((stud, index) => {
                let isMakeup = stud.tp === 'makeup';
                let isPreDone = stud.tp === 'pre_done';
                
                let badge = '🟢 Урок';
                let badgeStyle = 'color: #34c759';
                let cardClass = 'student-card';
                let checkState = ''; 
                let dateDisplay = 'none';
                let dateValue = '';
                
                if (isMakeup) {
                    badge = '🟠 ОТРАБОТКА';
                    badgeStyle = 'color: #ff9500';
                } else if (isPreDone) {
                    badge = `🔵 УЖЕ БЫЛО (${stud.i ? stud.i.split('-')[2]+'.'+stud.i.split('-')[1] : ''})`;
                    badgeStyle = 'color: #007aff';
                    cardClass += ' card-predone';
                    checkState = 'checked disabled';
                }

                // 🔥 ВОССТАНОВЛЕНИЕ ПРОШЛЫХ ГАЛОЧЕК
                if (isSubmitted && !isPreDone) {
                    if (stud.sp === true) {
                        checkState = 'checked';
                        if (isMakeup) {
                            dateDisplay = 'block';
                            dateValue = stud.sm || '';
                        }
                    }
                }

                let cleanName = stud.n.replace(/\d{2}\.\d{2}/, '').replace(/[Оо][Тт][Рр]/, '').trim();

                let html = `
                <div class="${cardClass}">
                    <div class="row">
                        <div>
                            <div class="name">${stud.t} — ${cleanName}</div>
                            <div class="status" style="${badgeStyle}; font-weight:500">${badge}</div>
                        </div>
                        <div class="toggle-container">
                            <label>
                                <input type="checkbox" class="toggle-checkbox" id="check-${index}" 
                                       onchange="toggleMakeup(${index}, ${isMakeup})" ${checkState}>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="makeup-date" id="date-block-${index}" style="display: ${dateDisplay}">
                        <label>🗓 Дата долга:</label>
                        <input type="date" id="date-input-${index}" value="${dateValue}" onclick="try{this.showPicker()}catch(e){}">
                    </div>
                </div>`;
                listDiv.innerHTML += html;
            });
        }

        function toggleMakeup(index, isMakeup) {
            if (!isMakeup) return;
            const checkbox = document.getElementById(`check-${index}`);
            const dateBlock = document.getElementById(`date-block-${index}`);
            dateBlock.style.display = checkbox.checked ? 'block' : 'none';
        }

        function sendData() {
            let dayData = allData[currentDateKey];
            let students = dayData.items || [];
            let isSubmitted = dayData.is_sub || false;

            let report = [];
            let hasError = false;

            students.forEach((stud, index) => {
                if (stud.tp === 'pre_done') return;

                let checkbox = document.getElementById(`check-${index}`);
                let isPresent = checkbox.checked;
                let makeupDate = "";

                if (stud.tp === 'makeup' && isPresent) {
                    let dateVal = document.getElementById(`date-input-${index}`).value;
                    if (!dateVal) {
                        alert(`❗ Укажите дату долга для: ${stud.n}`);
                        hasError = true;
                    }
                    makeupDate = dateVal;
                }

                report.push({
                    name: stud.n,
                    time: stud.t,
                    present: isPresent,
                    is_makeup: stud.tp === 'makeup',
                    makeup_for: makeupDate
                });
            });

            if (hasError) {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            
            let payload = {
                date: currentDateKey, 
                items: report
            };

            // 🔥 ПРОВЕРКА ЕСЛИ ОТЧЕТ УЖЕ СДАН
            if (isSubmitted) {
                tg.showConfirm("Этот отчет уже был сдан ранее.\n\nВы уверены, что хотите внести изменения и перезаписать его?", function(confirmed) {
                    if (confirmed) {
                        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        tg.sendData(JSON.stringify(payload));
                    }
                });
            } else {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.sendData(JSON.stringify(payload));
            }
        }
    </script>
</body>
</html>
