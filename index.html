<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал Tay Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 15px; margin: 0;
            display: flex; flex-direction: column; min-height: 95vh;
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 15px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--tg-theme-hint-color, #999);
            transition: 0.2s;
            font-weight: 500;
        }
        .tab.active {
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold;
        }

        .student-card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px; padding: 15px; margin-bottom: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .card-predone { border-left: 4px solid #007aff; background: rgba(0, 122, 255, 0.05); }
        
        .row { display: flex; justify-content: space-between; align-items: center; }
        .name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        
        .type-select { 
            font-size: 13px;
            font-weight: 600; 
            padding: 6px 28px 6px 10px; 
            border-radius: 8px; 
            border: 1px solid var(--tg-theme-hint-color, #ccc); 
            outline: none;
            background-color: var(--tg-theme-bg-color, #fff); 
            
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 14px;
            
            color: inherit; 
            cursor: pointer; 
            appearance: none;
            -webkit-appearance: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            transition: 0.2s; 
        }
        
        .type-select:active {
            transform: scale(0.96); 
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        
        .toggle-container { position: relative; width: 46px; height: 26px; }
        .toggle-checkbox { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .3s; border-radius: 34px;
        }
        .toggle-slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: #34c759; } 
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        .makeup-date { margin-top: 10px; display: none; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.05); }
        .makeup-date input[type="date"], .makeup-date select {
            width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ccc;
            box-sizing: border-box; font-size: 16px; margin-bottom: 8px;
            background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color);
        }

        #sick-btn {
            width: 100%; padding: 10px;
            background-color: rgba(255, 59, 48, 0.1);
            color: #ff3b30; border: 1px dashed #ff3b30; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            margin-bottom: 15px; transition: 0.3s;
        }
        #sick-btn:active { background-color: rgba(255, 59, 48, 0.2); }

        #main-btn {
            margin-top: auto; width: 100%; padding: 15px; 
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        
        #empty-msg { text-align: center; margin-top: 50px; opacity: 0.5; font-size: 14px; }
    </style>
</head>
<body>

    <div class="tabs" id="tabs-container"></div>
    <button id="sick-btn" onclick="markAllSick()">🤒 Я болею (Отменить все уроки за день)</button>
    
    <div id="list"></div>
    <div id="empty-msg" style="display:none">Учеников нет 😴</div>
    
    <button id="main-btn" onclick="sendData()">📤 Отправить отчет</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let allData = {}; 
        let currentDateKey = ""; 

        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');

        try {
            if (rawData) {
                allData = JSON.parse(decodeURIComponent(rawData));
                let keys = Object.keys(allData).sort().reverse();
                
                if (keys.length === 0) throw new Error("No Data");

                currentDateKey = keys[0]; 
                
                renderTabs(keys);
                renderList(currentDateKey);
            }
        } catch (e) {
            document.getElementById('list').innerHTML = "Ошибка загрузки: " + e;
        }

        function renderTabs(keys) {
            const container = document.getElementById('tabs-container');
            container.innerHTML = "";
            
            keys.forEach(dateStr => {
                let parts = dateStr.split('-');
                let label = `${parts[2]}.${parts[1]}`; 
                
                let d = new Date(dateStr);
                let today = new Date();
                today.setHours(0,0,0,0); d.setHours(0,0,0,0);
                
                let diff = (today - d) / (1000 * 60 * 60 * 24);
                if (diff === 0) label = "Сегодня";
                if (diff === 1) label = "Вчера";

                let tab = document.createElement('div');
                tab.className = `tab ${dateStr === currentDateKey ? 'active' : ''}`;
                
                if (allData[dateStr].is_sub) {
                    label += " ✅";
                }
                
                tab.innerText = label;
                tab.onclick = () => switchTab(dateStr);
                tab.id = `tab-${dateStr}`;
                container.appendChild(tab);
            });
        }

        // 🔥 СОХРАНЕНИЕ ЧЕРНОВИКОВ МЕЖДУ ВКЛАДКАМИ
        function saveCurrentTabState() {
            if (!currentDateKey || !allData[currentDateKey]) return;
            let students = allData[currentDateKey].items;
            
            students.forEach((stud, index) => {
                if (stud.tp === 'pre_done') return;
                
                let checkbox = document.getElementById(`check-${index}`);
                let typeSelect = document.getElementById(`type-select-${index}`);
                
                if (checkbox && typeSelect) {
                    stud._draft_present = checkbox.checked;
                    stud._draft_type = typeSelect.value;
                    
                    let draftDate = "";
                    if (typeSelect.value === 'makeup' && checkbox.checked) {
                        let selectEl = document.getElementById(`missed-select-${index}`);
                        let inputEl = document.getElementById(`date-input-${index}`);
                        if (selectEl && selectEl.value !== 'custom' && selectEl.value !== '') {
                            draftDate = selectEl.value;
                        } else if (inputEl) {
                            draftDate = inputEl.value;
                        }
                    }
                    stud._draft_date = draftDate;
                }
            });
        }

        function switchTab(dateKey) {
            saveCurrentTabState(); // Сначала сохраняем то, что накликали
            document.getElementById(`tab-${currentDateKey}`).classList.remove('active');
            currentDateKey = dateKey;
            document.getElementById(`tab-${currentDateKey}`).classList.add('active');
            renderList(dateKey);
        }

        function markAllSick() {
            tg.showConfirm("Вы уверены, что хотите отметить ВСЕ уроки за этот день как отмененные по вашей болезни?", function(confirmed) {
                if (confirmed) {
                    let students = allData[currentDateKey].items || [];
                    students.forEach((stud, i) => {
                        if (stud.tp === 'pre_done') return;
                        let selectEl = document.getElementById(`type-select-${i}`);
                        let checkEl = document.getElementById(`check-${i}`);
                        if (selectEl && checkEl) {
                            selectEl.value = 'teacher_cancel';
                            checkEl.checked = false;
                            updateTypeColor(i);
                        }
                    });
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }
            });
        }

        function updateTypeColor(index) {
            const selectEl = document.getElementById(`type-select-${index}`);
            if (!selectEl) return;
            
            const val = selectEl.value;
            let color = "#34c759"; 
            if (val === 'makeup') color = "#ff9500"; 
            if (val === 'trial') color = "#00c7c7";  
            if (val === 'onetime') color = "#af52de"; 
            if (val === 'cert') color = "#ffcc00";    
            if (val === 'late') color = "#ff3b30";    
            if (val === 'teacher_cancel') color = "#ff3b30"; 
            
            selectEl.style.color = color;

            const checkbox = document.getElementById(`check-${index}`);
            const dateBlock = document.getElementById(`date-block-${index}`);
            
            if (val === 'teacher_cancel') checkbox.checked = false; 

            if (val === 'makeup' && checkbox.checked) {
                dateBlock.style.display = 'block';
            } else {
                dateBlock.style.display = 'none';
            }
        }

        function toggleMakeup(index) {
            const selectEl = document.getElementById(`type-select-${index}`);
            const checkbox = document.getElementById(`check-${index}`);
            const dateBlock = document.getElementById(`date-block-${index}`);
            
            if (selectEl && selectEl.value === 'teacher_cancel' && checkbox.checked) {
                selectEl.value = 'regular';
                updateTypeColor(index);
            }
            
            if (selectEl && selectEl.value === 'makeup' && checkbox.checked) {
                dateBlock.style.display = 'block';
            } else {
                dateBlock.style.display = 'none';
            }
        }

        function renderList(dateKey) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            
            let dayData = allData[dateKey];
            if (!dayData) return;

            let students = dayData.items || [];
            let isSubmitted = dayData.is_sub || false;
            
            if (students.length === 0) {
                document.getElementById('empty-msg').style.display = 'block';
                document.getElementById('main-btn').style.display = 'none';
                document.getElementById('sick-btn').style.display = 'none';
                return;
            } else {
                document.getElementById('empty-msg').style.display = 'none';
                document.getElementById('main-btn').style.display = 'block';
                document.getElementById('sick-btn').style.display = 'block';
            }

            const mainBtn = document.getElementById('main-btn');
            if (isSubmitted) {
                mainBtn.innerHTML = "⚠️ Перезаписать отчет";
                mainBtn.style.backgroundColor = "#ff9500"; 
            } else {
                mainBtn.innerHTML = "📤 Отправить отчет";
                mainBtn.style.backgroundColor = "var(--tg-theme-button-color, #3390ec)";
            }

            students.forEach((stud, index) => {
                let isPreDone = stud.tp === 'pre_done';
                let cardClass = 'student-card';
                let dateDisplay = 'none';
                let dateValue = '';
                
                // 1. Базовая логика из базы данных
                let defaultType = 'regular';
                if (stud.tp === 'makeup' || stud.n.toLowerCase().includes('отр')) defaultType = 'makeup';
                if (stud.tp === 'trial' || stud.n.toLowerCase().includes('проб')) defaultType = 'trial';
                if (stud.tp === 'cert' || stud.n.toLowerCase().includes('серт') || stud.n.toLowerCase().includes('сртф')) defaultType = 'cert';

                // 🔥 ГАЛОЧКИ ВЫКЛЮЧЕНЫ ПО УМОЛЧАНИЮ
                let checkState = ''; 

                if (isPreDone) {
                    cardClass += ' card-predone';
                    checkState = 'checked disabled';
                }

                // 2. Логика восстановления из отправленного отчета
                if (isSubmitted && !isPreDone) {
                    if (stud.sp === true) checkState = 'checked';
                    if (stud.st === "Отмена (педагог)") defaultType = 'teacher_cancel';
                    if (stud.st === "Опоздал/а") defaultType = 'late';

                    if (stud.sm) {
                        defaultType = 'makeup';
                        dateValue = stud.sm;
                        if (stud.sp === true) dateDisplay = 'block';
                    }
                }

                // 3. 🔥 ПЕРЕЗАПИСЬ ЧЕРНОВИКАМИ
                if (stud._draft_type !== undefined) {
                    defaultType = stud._draft_type;
                    checkState = stud._draft_present ? 'checked' : '';
                    if (defaultType === 'makeup' && stud._draft_present) {
                        dateValue = stud._draft_date;
                        dateDisplay = 'block';
                    } else {
                        dateDisplay = 'none';
                    }
                }

                // 🔥 ОСТАВЛЯЕМ ПОДСКАЗКИ (убираем только даты и лишние пробелы)
                let cleanName = stud.n.replace(/\d{2}\.\d{2}/g, '')
                                      .replace(/\s+/g, ' ')
                                      .trim();

                let badgeHtml = '';
                if (isPreDone) {
                    badgeHtml = `<div class="status" style="color: #007aff; font-weight:500">🔵 УЖЕ БЫЛО (${stud.i ? stud.i.split('-')[2]+'.'+stud.i.split('-')[1] : ''})</div>`;
                } else {
                    badgeHtml = `
                    <select id="type-select-${index}" class="type-select" onchange="updateTypeColor(${index})">
                        <option value="regular" ${defaultType==='regular'?'selected':''}>🟢 Обычный урок</option>
                        <option value="makeup" ${defaultType==='makeup'?'selected':''}>🟠 Отработка</option>
                        <option value="trial" ${defaultType==='trial'?'selected':''}>💠 Пробный</option>
                        <option value="onetime" ${defaultType==='onetime'?'selected':''}>🟣 Разовый</option>
                        <option value="cert" ${defaultType==='cert'?'selected':''}>🟡 По сертификату</option>
                        <option value="late" ${defaultType==='late'?'selected':''}>⏰ Опоздал/а</option>
                        <option value="teacher_cancel" ${defaultType==='teacher_cancel'?'selected':''}>🤒 Отмена (педагог)</option>
                    </select>`;
                }

                // 🔥 УМНЫЙ ВЫПАДАЮЩИЙ СПИСОК (С возвратом сохраненных дат и фиксом форматов)
                let normalizedDateValue = dateValue;
                if (dateValue && dateValue.includes('.')) {
                    let dParts = dateValue.split('.');
                    if (dParts.length === 3) normalizedDateValue = `${dParts[2]}-${dParts[1]}-${dParts[0]}`;
                }

                let hasMissed = (stud.md && stud.md.length > 0) || normalizedDateValue;
                let missedOptionsHtml = '';
                let inputDisplay = 'none';

                if (hasMissed) {
                    let opts = `<option value="">-- Выберите долг --</option>`;
                    let foundInMd = false;

                    if (stud.md) {
                        stud.md.forEach(d_raw => {
                            let parts_arr = d_raw.split('|');
                            let d = parts_arr[0]; 
                            let reason = parts_arr[1];
                            
                            let parts = d.split('-');
                            let ruDate = `${parts[2]}.${parts[1]}`;
                            
                            let label = (reason === 'teacher') ? `Отмена от ${ruDate} (болел педагог)` : `Пропуск от ${ruDate}`;
                            let isSel = (normalizedDateValue === d || dateValue === d_raw) ? 'selected' : '';
                            if (isSel) foundInMd = true;
                            opts += `<option value="${d_raw}" ${isSel}>${label}</option>`;
                        });
                    }
                    
                    // Если дата сохранена, но бот её уже вычеркнул из активных долгов
                    if (normalizedDateValue && !foundInMd && dateValue !== 'custom') {
                        let pureDate = normalizedDateValue.split('|')[0];
                        let parts = pureDate.split('-');
                        let ruDate = parts.length === 3 ? `${parts[2]}.${parts[1]}` : pureDate;
                        opts += `<option value="${pureDate}" selected>✅ Сохраненный долг за ${ruDate}</option>`;
                    }
                    
                    let isCustomSel = (dateValue === 'custom') ? 'selected' : '';
                    opts += `<option value="custom" ${isCustomSel}>Своя дата (календарь)...</option>`;
                    
                    missedOptionsHtml = `
                    <select id="missed-select-${index}" onchange="checkCustomDate(${index})">
                        ${opts}
                    </select>`;
                } else {
                    inputDisplay = 'block'; 
                }

                let pureDateForInput = normalizedDateValue ? normalizedDateValue.split('|')[0] : '';

                let html = `
                <div class="${cardClass}">
                    <div class="row">
                        <div>
                            <div class="name">${stud.t} — ${cleanName}</div>
                            ${badgeHtml}
                        </div>
                        <div class="toggle-container">
                            <label>
                                <input type="checkbox" class="toggle-checkbox" id="check-${index}" 
                                       onchange="toggleMakeup(${index})" ${checkState}>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="makeup-date" id="date-block-${index}" style="display: ${dateDisplay}">
                        <label>🗓 Закрыть долг за:</label><br>
                        ${missedOptionsHtml}
                        <input type="date" id="date-input-${index}" value="${pureDateForInput}" 
                               style="display: ${inputDisplay};" onclick="try{this.showPicker()}catch(e){}">
                    </div>
                </div>`;
                listDiv.innerHTML += html;
                
                if (!isPreDone) {
                    setTimeout(() => updateTypeColor(index), 10);
                }
            });
        }

        function checkCustomDate(index) {
            const selectEl = document.getElementById(`missed-select-${index}`);
            const inputEl = document.getElementById(`date-input-${index}`);
            if (selectEl.value === 'custom') {
                inputEl.style.display = 'block';
                inputEl.focus();
            } else {
                inputEl.style.display = 'none';
            }
        }

        function sendData() {
            saveCurrentTabState(); 
            
            let dayData = allData[currentDateKey];
            let students = dayData.items || [];
            let isSubmitted = dayData.is_sub || false;

            let report = [];
            let hasError = false;

            students.forEach((stud, index) => {
                if (stud.tp === 'pre_done') return;

                let isPresent = stud._draft_present !== undefined ? stud._draft_present : false;
                let lType = stud._draft_type || 'regular';
                let makeupDate = stud._draft_date || "";

                if (lType === 'teacher_cancel') isPresent = false;

                if (lType === 'makeup' && isPresent && !makeupDate) {
                    alert(`❗ Выберите или укажите дату долга для: ${stud.n}`);
                    hasError = true;
                }

                report.push({
                    name: stud.n,
                    time: stud.t,
                    present: isPresent,
                    l_type: lType, 
                    makeup_for: makeupDate
                });
            });

            if (hasError) {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            
            let payload = {
                date: currentDateKey, 
                items: report
            };

            if (isSubmitted) {
                tg.showConfirm("Этот отчет уже был сдан ранее.\n\nВы уверены, что хотите внести изменения и перезаписать его?", function(confirmed) {
                    if (confirmed) {
                        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        tg.sendData(JSON.stringify(payload));
                    }
                });
            } else {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.sendData(JSON.stringify(payload));
            }
        }
    </script>
</body>
</html>
